version: '3'

vars:
  BUILD_DIR: build
  BLINKC: build/blinkc
  JOBS:
    sh: nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 12
  VERSION:
    sh: cat VERSION | tr -d '\n'

tasks:
  bootstrap:
    desc: Build compiler from bootstrap and verify self-hosting
    sources:
      - bootstrap/runtime*.h
      - bootstrap/bootstrap.sh
      - src/*.bl
      - lib/std/*.bl
      - lib/pkg/*.bl
    generates:
      - '{{.BUILD_DIR}}/blinkc'
    cmds:
      - ./bootstrap/bootstrap.sh

  regen:
    desc: Rebuild compiler and verify self-hosting
    cmds:
      - cp -f {{.BUILD_DIR}}/blinkc {{.BUILD_DIR}}/blinkc.bak 2>/dev/null || true
      - ./bootstrap/bootstrap.sh
      - task: build-cli

  compile-test:
    desc: "Compile a single test file (usage: task compile-test -- test_name)"
    deps: [build-cli]
    cmds:
      - '{{.BUILD_DIR}}/blink build tests/{{.CLI_ARGS}}.bl'

  test:
    desc: Compile and run all test_*.bl files
    deps: [build-cli]
    cmds:
      - '{{.BUILD_DIR}}/blink test tests/ --parallel {{.JOBS}}'

  build-cli:
    desc: Build the blink CLI tool
    deps: [bootstrap]
    sources:
      - src/*.bl
      - lib/std/*.bl
      - lib/pkg/*.bl
      - '{{.BUILD_DIR}}/blinkc'
      - llms.md
      - llms-full.md
      - CHANGELOG.md
      - bootstrap/runtime*.h
      - templates/**
    generates:
      - '{{.BUILD_DIR}}/blink'
    cmds:
      - |
        # Seed build/blink on a clean tree so __build-stdlib-archive has a runner.
        if [ ! -x "{{.BUILD_DIR}}/blink" ]; then
          {{.BLINKC}} src/cli.bl {{.BUILD_DIR}}/cli.c
          sed -i 's/blink_cli_version = "dev"/blink_cli_version = "{{.VERSION}}-dev+'"$(date +%Y%m%d%H%M%S)"'"/' {{.BUILD_DIR}}/cli.c
          cc -o {{.BUILD_DIR}}/blink {{.BUILD_DIR}}/cli.c -lm -lgc
        fi
        {{.BUILD_DIR}}/blink __build-stdlib-archive
        {{.BLINKC}} --link-archive {{.BUILD_DIR}}/libblink_std.h src/cli.bl {{.BUILD_DIR}}/cli.c
        sed -i 's/blink_cli_version = "dev"/blink_cli_version = "{{.VERSION}}-dev+'"$(date +%Y%m%d%H%M%S)"'"/' {{.BUILD_DIR}}/cli.c
        cc -o {{.BUILD_DIR}}/blink {{.BUILD_DIR}}/cli.c -I{{.BUILD_DIR}} {{.BUILD_DIR}}/libblink_std.a -lm -lgc -pthread -Wl,--gc-sections
        echo "CLI built at {{.BUILD_DIR}}/blink ({{.VERSION}}-dev, archive-linked)"

  build:
    desc: Build and install blink to ~/.local/bin/
    deps: [build-cli]
    cmds:
      - mkdir -p ~/.local/bin
      - rm -f ~/.local/bin/blink.bak
      - mv ~/.local/bin/blink ~/.local/bin/blink.bak 2>/dev/null || true
      - cp {{.BUILD_DIR}}/blink ~/.local/bin/blink
      - echo "Installed blink to ~/.local/bin/blink"

  test-fmt:
    desc: Test formatter idempotency and golden outputs
    deps: [bootstrap]
    cmds:
      - mkdir -p .tmp
      - |
        printf '%s\n' test_hof test_lazy_iter test_semver test_toml test_manifest test_lockfile test_http_types test_http_error test_json test_json_builder test_args test_args_cli test_derive_nested test_embed test_combining_iterators test_http_client test_iterators test_match_void_if test_multifile_visibility test_question_ops test_string_iter test_audit test_e2e_gitdep test_e2e_transitive test_e2e_pub_visibility test_async_spawn_types test_tcp_socket test_pub_import test_std_testing test_c_reserved_names test_module_qualified_types test_ue_complex_returns test_effects test_effect_vtable test_sqlite test_builtin_methods test_priv_access test_unused_import test_cross_module_effects test_cross_module_effects_helper > .tmp/fmt_skip.txt

        golden_results=$(systemd-run --user --scope -p MemoryMax=50G --quiet parallel -j {{.JOBS}} --halt never ./scripts/run_fmt_golden.sh {} {{.BLINKC}} ::: tests/fmt/input_*.bl 2>&1 || true)
        idem_results=$(systemd-run --user --scope -p MemoryMax=50G --quiet parallel -j {{.JOBS}} --halt never ./scripts/run_fmt_idempotent.sh {} {{.BLINKC}} .tmp/fmt_skip.txt ::: tests/test_*.bl 2>&1 || true)
        sem_results=$(systemd-run --user --scope -p MemoryMax=50G --quiet parallel -j {{.JOBS}} --halt never ./scripts/run_fmt_semantic.sh {} {{.BLINKC}} .tmp/fmt_skip.txt ::: tests/test_*.bl 2>&1 || true)

        all_results=$(printf '%s\n%s\n%s' "$golden_results" "$idem_results" "$sem_results")

        passed=$(echo "$all_results" | grep -c "^PASS" || true)
        failed=$(echo "$all_results" | grep -c "^FAIL" || true)
        skipped=$(echo "$all_results" | grep -c "^SKIP" || true)
        echo "fmt: ${passed} passed, ${failed} failed, ${skipped} skipped"
        if [ "$failed" -gt 0 ]; then
          echo "Failures:"
          echo "$all_results" | grep "^FAIL" | sed 's/^/  /'
          exit 1
        fi

  fuzz:
    desc: Run fuzz testing against lexer and parser
    deps: [bootstrap]
    cmds:
      - mkdir -p .tmp/fuzz_crashes
      - ./scripts/fuzz.sh {{.BLINKC}} {{.CLI_ARGS | default "500"}}

  test-installed:
    desc: Test that installed blink works outside project tree
    deps: [build-cli]
    cmds:
      - |
        set -e
        TMPDIR=$(mktemp -d)
        trap "rm -rf $TMPDIR" EXIT
        cp {{.BUILD_DIR}}/blink "$TMPDIR/blink"
        cat > "$TMPDIR/test_standalone.bl" << 'BLINK'
        import std.path.{path_join}

        fn main() ! IO {
            let p = path_join("hello", "world")
            io.println(p)
            let s = sb_new()
            sb_write(s, "ok")
            io.println(sb_to_str(s))
        }
        BLINK
        OUTPUT=$("$TMPDIR/blink" run "$TMPDIR/test_standalone.bl" 2>/dev/null)
        EXPECTED=$(printf 'hello/world\nok')
        if [ "$OUTPUT" = "$EXPECTED" ]; then
          echo "PASS test-installed"
        else
          echo "FAIL test-installed"
          echo "Expected: $EXPECTED"
          echo "Got: $OUTPUT"
          exit 1
        fi

  ci:
    desc: Full CI — regen bootstrap + run all tests
    silent: true
    sources:
      - src/*.bl
      - lib/std/*.bl
      - lib/pkg/*.bl
      - tests/test_*.bl
      - tests/fmt/**
      - bootstrap/runtime*.h
      - bootstrap/bootstrap.sh
      - scripts/run_fmt_*.sh
      - llms.md
      - llms-full.md
      - CHANGELOG.md
    cmds:
      - find .tmp -type f ! -name '.gitkeep' -delete 2>/dev/null || true
      - |
        output=$(./bootstrap/bootstrap.sh 2>&1)
        if echo "$output" | grep -q "Bootstrap verified"; then
          echo "regen: ok"
        else
          echo "$output"
          exit 1
        fi
      - task: check-stdlib-registry
      - |
        if [ ! -x "{{.BUILD_DIR}}/blink" ]; then
          {{.BLINKC}} src/cli.bl {{.BUILD_DIR}}/cli.c 2>/dev/null
          sed -i 's/blink_cli_version = "dev"/blink_cli_version = "{{.VERSION}}-dev+'"$(date +%Y%m%d%H%M%S)"'"/' {{.BUILD_DIR}}/cli.c
          cc -o {{.BUILD_DIR}}/blink {{.BUILD_DIR}}/cli.c -lm -lgc
        fi
        {{.BUILD_DIR}}/blink __build-stdlib-archive
        {{.BLINKC}} --link-archive {{.BUILD_DIR}}/libblink_std.h src/cli.bl {{.BUILD_DIR}}/cli.c 2>/dev/null
        sed -i 's/blink_cli_version = "dev"/blink_cli_version = "{{.VERSION}}-dev+'"$(date +%Y%m%d%H%M%S)"'"/' {{.BUILD_DIR}}/cli.c
        cc -o {{.BUILD_DIR}}/blink {{.BUILD_DIR}}/cli.c -I{{.BUILD_DIR}} {{.BUILD_DIR}}/libblink_std.a -lm -lgc -pthread -Wl,--gc-sections
      - '{{.BUILD_DIR}}/blink test tests/ --parallel {{.JOBS}} --quiet'
      - |
        mkdir -p .tmp
        printf '%s\n' test_hof test_lazy_iter test_semver test_toml test_manifest test_lockfile test_http_types test_http_error test_json test_json_builder test_args test_args_cli test_derive_nested test_embed test_combining_iterators test_http_client test_iterators test_match_void_if test_multifile_visibility test_question_ops test_string_iter test_audit test_e2e_gitdep test_e2e_transitive test_e2e_pub_visibility test_async_spawn_types test_tcp_socket test_pub_import test_std_testing test_c_reserved_names test_module_qualified_types test_ue_complex_returns test_effects test_effect_vtable test_sqlite test_builtin_methods test_priv_access test_unused_import test_cross_module_effects test_cross_module_effects_helper > .tmp/fmt_skip.txt

        golden_results=$(systemd-run --user --scope -p MemoryMax=50G --quiet parallel -j {{.JOBS}} --halt never ./scripts/run_fmt_golden.sh {} {{.BLINKC}} ::: tests/fmt/input_*.bl 2>&1 || true)
        idem_results=$(systemd-run --user --scope -p MemoryMax=50G --quiet parallel -j {{.JOBS}} --halt never ./scripts/run_fmt_idempotent.sh {} {{.BLINKC}} .tmp/fmt_skip.txt ::: tests/test_*.bl 2>&1 || true)
        sem_results=$(systemd-run --user --scope -p MemoryMax=50G --quiet parallel -j {{.JOBS}} --halt never ./scripts/run_fmt_semantic.sh {} {{.BLINKC}} .tmp/fmt_skip.txt ::: tests/test_*.bl 2>&1 || true)

        all_results=$(printf '%s\n%s\n%s' "$golden_results" "$idem_results" "$sem_results")

        passed=$(echo "$all_results" | grep -c "^PASS" || true)
        failed=$(echo "$all_results" | grep -c "^FAIL" || true)
        skipped=$(echo "$all_results" | grep -c "^SKIP" || true)
        echo "fmt: ${passed} passed, ${failed} failed, ${skipped} skipped"
        if [ "$failed" -gt 0 ]; then
          echo "Failures:"
          echo "$all_results" | grep "^FAIL" | sed 's/^/  /'
          exit 1
        fi
      - task: ci-per-module
      - |
        set -e
        TMPDIR=$(mktemp -d)
        trap "rm -rf $TMPDIR" EXIT
        cp {{.BUILD_DIR}}/blink "$TMPDIR/blink"
        cat > "$TMPDIR/test_standalone.bl" << 'BLINK'
        import std.path.{path_join}

        fn main() ! IO {
            let p = path_join("hello", "world")
            io.println(p)
            let s = sb_new()
            sb_write(s, "ok")
            io.println(sb_to_str(s))
        }
        BLINK
        OUTPUT=$("$TMPDIR/blink" run "$TMPDIR/test_standalone.bl" 2>/dev/null)
        EXPECTED=$(printf 'hello/world\nok')
        if [ "$OUTPUT" = "$EXPECTED" ]; then
          echo "test-installed: ok"
        else
          echo "FAIL test-installed"
          echo "Expected: $EXPECTED"
          echo "Got: $OUTPUT"
          exit 1
        fi

  ci-per-module:
    desc: Verify per-module .o pipeline produces a binary identical in behaviour to monolith mode
    silent: true
    sources:
      - src/*.bl
      - lib/std/*.bl
      - tests/multifile/src/*.bl
    cmds:
      - |
        set -e
        # Bootstrap loop must not consult the .o cache — emit-per-module
        # owns its own tmpdirs and cc invocations, so cache state must
        # not leak into the byte-equality and self-host checks below.
        export BLINK_CACHE_DIR=
        TMPDIR=$(mktemp -d)
        trap "rm -rf $TMPDIR" EXIT

        # Monolith reference run.
        bin/blink run tests/multifile/src/main.bl > "$TMPDIR/monolith.out" 2>&1

        # Per-module emit + cc link with pinned (sorted) link order.
        mkdir -p "$TMPDIR/per_mod"
        bin/blink __emit-per-module tests/multifile/src/main.bl "$TMPDIR/per_mod"
        cc -o "$TMPDIR/per_mod/bin" $(ls "$TMPDIR"/per_mod/*.c | sort) -lm -lgc
        "$TMPDIR/per_mod/bin" > "$TMPDIR/per_module.out" 2>&1

        if diff -u "$TMPDIR/monolith.out" "$TMPDIR/per_module.out" > /dev/null; then
          echo "ci-per-module: ok (multifile, output matches monolith)"
        else
          echo "FAIL ci-per-module: per-module binary output differs from monolith"
          echo "--- monolith"
          cat "$TMPDIR/monolith.out"
          echo "--- per-module"
          cat "$TMPDIR/per_module.out"
          exit 1
        fi

        # Self-host: per-module emit on the compiler itself must produce a
        # working blink binary that can typecheck a sample program. We use
        # this same emit dir for the regen-invariant gen1/gen2 diff below.
        mkdir -p "$TMPDIR/cli_pm"
        bin/blink __emit-per-module src/cli.bl "$TMPDIR/cli_pm"
        # Pinned link order (sorted glob) so the final binary is also stable.
        cc -o "$TMPDIR/cli_pm/blink-pm" $(ls "$TMPDIR"/cli_pm/*.c | sort) -lm -lgc
        "$TMPDIR/cli_pm/blink-pm" check tests/multifile/src/main.bl > "$TMPDIR/selfhost.out" 2>&1
        if /usr/bin/grep -q "^ok:" "$TMPDIR/selfhost.out"; then
          echo "ci-per-module: ok (cli.bl self-host)"
        else
          echo "FAIL ci-per-module: per-module-built compiler failed self-host check"
          cat "$TMPDIR/selfhost.out"
          exit 1
        fi

        # bc004e regen invariant: per-module emit must be deterministic
        # across runs AND byte-equal between gen1 (current bin/blink)
        # and gen2 (the per-module-built compiler from the self-host
        # step). Combined check — re-emit with bin/blink for determinism,
        # emit with blink-pm for the regen leg, diff both against cli_pm.
        mkdir -p "$TMPDIR/det" "$TMPDIR/gen2"
        bin/blink __emit-per-module src/cli.bl "$TMPDIR/det"
        "$TMPDIR/cli_pm/blink-pm" __emit-per-module src/cli.bl "$TMPDIR/gen2"
        diff_dirs() {
          fail=0
          for f in "$TMPDIR/cli_pm"/*.c "$TMPDIR/cli_pm"/*.h; do
            bn=$(basename "$f")
            if ! diff -q "$f" "$1/$bn" > /dev/null 2>&1; then
              echo "  DIFF $bn"
              fail=1
            fi
          done
          return $fail
        }
        if ! diff_dirs "$TMPDIR/det"; then
          echo "FAIL ci-per-module: per-module emit is not deterministic across runs"
          exit 1
        fi
        echo "ci-per-module: ok (per-module emit is deterministic across runs)"
        if ! diff_dirs "$TMPDIR/gen2"; then
          echo "FAIL ci-per-module: gen1 vs gen2 per-module .c/.h are not byte-equal"
          exit 1
        fi
        echo "ci-per-module: ok (gen1 vs gen2 per-module byte-equal)"

  xavbnw-check:
    desc: br xavbnw harness — strip @module("") from 5 stdlib files in turn, assert task regen clean
    silent: true
    cmds:
      - ./scripts/xavbnw_check.sh

  gen-stdlib-registry:
    desc: Regenerate src/embedded_stdlib_registry.bl from lib/std and lib/pkg
    sources:
      - lib/std/*.bl
      - lib/pkg/*.bl
      - scripts/gen_embedded_stdlib.sh
    generates:
      - src/embedded_stdlib_registry.bl
    cmds:
      - ./scripts/gen_embedded_stdlib.sh

  check-stdlib-registry:
    desc: Fail if src/embedded_stdlib_registry.bl is stale vs lib/std and lib/pkg
    sources:
      - lib/std/*.bl
      - lib/pkg/*.bl
      - scripts/gen_embedded_stdlib.sh
      - src/embedded_stdlib_registry.bl
    cmds:
      - |
        ./scripts/gen_embedded_stdlib.sh > /dev/null
        if ! git diff --quiet -- src/embedded_stdlib_registry.bl; then
          echo "ERROR: src/embedded_stdlib_registry.bl is stale." >&2
          echo "Run: task gen-stdlib-registry, then commit." >&2
          git --no-pager diff -- src/embedded_stdlib_registry.bl >&2
          exit 1
        fi
        echo "stdlib-registry: ok"

  clean-tmp:
    desc: Remove all temp files from .tmp/
    cmds:
      - find .tmp -type f ! -name '.gitkeep' -delete 2>/dev/null || true

  bench:
    desc: Compile and run benchmarks/arena_process_batch.bl (release mode)
    deps: [build-cli]
    cmds:
      - bin/blink build --release benchmarks/arena_process_batch.bl -o {{.BUILD_DIR}}/arena_process_batch
      - '{{.BUILD_DIR}}/arena_process_batch'

  build-binaries:
    desc: Cross-compile blink CLI binaries for all platforms
    deps: [build-cli]
    vars:
      GC_SRC: bootstrap/vendor/gc/extra/gc.c
      GC_INC: bootstrap/vendor/gc/include
      GC_STUBS: bootstrap/vendor/gc/include/zig-stubs
      GC_DEFS: -DGC_THREADS -DGC_BUILTIN_ATOMIC -DUSE_MMAP -DUSE_MUNMAP
      GC_MACOS_DEFS: -DGC_THREADS -DGC_BUILTIN_ATOMIC -DUSE_MMAP -DUSE_MUNMAP -DNO_MPROTECT_VDB
    cmds:
      - bin/blink build src/cli.bl --emit c
      - sed -i 's/blink_cli_version = "[^"]*"/blink_cli_version = "{{.VERSION}}"/' {{.BUILD_DIR}}/cli.c
      - mkdir -p .tmp
      - zig cc -c -O2 {{.GC_DEFS}} -I{{.GC_INC}} -target x86_64-linux-gnu -o .tmp/gc-linux-x86_64.o {{.GC_SRC}}
      - zig cc -c -O2 {{.GC_MACOS_DEFS}} -I{{.GC_STUBS}} -I{{.GC_INC}} -target x86_64-macos -o .tmp/gc-macos-x86_64.o {{.GC_SRC}}
      - zig cc -c -O2 {{.GC_MACOS_DEFS}} -I{{.GC_STUBS}} -I{{.GC_INC}} -target aarch64-macos -o .tmp/gc-macos-aarch64.o {{.GC_SRC}}
      - zig cc -O2 -Wno-parentheses-equality -I{{.GC_INC}} -target x86_64-linux-gnu -o {{.BUILD_DIR}}/blink-linux-x86_64 {{.BUILD_DIR}}/cli.c .tmp/gc-linux-x86_64.o -lm
      - zig cc -O2 -Wno-parentheses-equality -I{{.GC_STUBS}} -I{{.GC_INC}} -target x86_64-macos -o {{.BUILD_DIR}}/blink-macos-x86_64 {{.BUILD_DIR}}/cli.c .tmp/gc-macos-x86_64.o -lm
      - zig cc -O2 -Wno-parentheses-equality -I{{.GC_STUBS}} -I{{.GC_INC}} -target aarch64-macos -o {{.BUILD_DIR}}/blink-macos-aarch64 {{.BUILD_DIR}}/cli.c .tmp/gc-macos-aarch64.o -lm
      - echo "Built binaries for linux-x86_64, macos-x86_64, macos-aarch64 ({{.VERSION}})"

  release:
    desc: "Create a GitHub release (usage: task release -- v0.5.0)"
    preconditions:
      - sh: test -n "{{.CLI_ARGS}}"
        msg: "Version required. Usage: task release -- v0.5.0"
      - sh: echo "{{.CLI_ARGS}}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'
        msg: "Version must match vX.Y.Z format (e.g. v0.5.0)"
      - sh: test "v{{.VERSION}}" = "{{.CLI_ARGS}}"
        msg: "Tag {{.CLI_ARGS}} does not match VERSION file (v{{.VERSION}}). Update VERSION first."
      - sh: test -z "$(git status --porcelain)"
        msg: "Working directory must be clean. Commit or stash changes first."
    cmds:
      - task: ci
      - task: build-binaries
      - git tag {{.CLI_ARGS}}
      - git push origin {{.CLI_ARGS}}
      - |
        gh release create {{.CLI_ARGS}} \
          {{.BUILD_DIR}}/blink-linux-x86_64 \
          {{.BUILD_DIR}}/blink-macos-x86_64 \
          {{.BUILD_DIR}}/blink-macos-aarch64 \
          llms-full.md \
          --title "{{.CLI_ARGS}}" \
          --generate-notes
      - echo "Released {{.CLI_ARGS}} — https://github.com/blinklang/blink/releases/tag/{{.CLI_ARGS}}"
      - sed -i 's/blink_cli_version = "[^"]*"/blink_cli_version = "{{.VERSION}}"/' {{.BUILD_DIR}}/cli.c
      - cc -o {{.BUILD_DIR}}/blink {{.BUILD_DIR}}/cli.c -lm -lgc
      - task: build
